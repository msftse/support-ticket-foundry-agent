name: support-ticket-workflow-agent
description: >
  Support-ticket workflow POC that runs parallel triage / knowledge / context /
  docs / business branches, then a validator agent + deterministic retry
  controller that loops back targeted branches before closing or escalating.
metadata:
  tags:
    - Agent Framework
    - Workflow
    - Retry Controller
    - Microsoft Learn MCP
    - Responses Protocol
template:
  name: support-ticket-workflow-agent
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
resources:
  - kind: model
    id: gpt-4o
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
